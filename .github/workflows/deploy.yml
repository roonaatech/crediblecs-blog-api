name: Build and Deploy Blog API

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Build & Deploy Blog API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --production

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r src/ deploy/
          cp -r database/ deploy/
          cp server.js deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "deploy/*"
          target: "/opt/crediblecs-blog-api"
          strip_components: 1

      - name: Execute deployment script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/crediblecs-blog-api
            npm install --production
            pm2 restart crediblecs-blog-api || pm2 start server.js --name crediblecs-blog-api
            pm2 save
